name: CI/CD Docker Images

on:
  push:
    branches: [master]
  release:
    types: [published]

jobs:

  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python_version: ["3.13", "3.14"]
        texlive_version: ["2025"]
        ffmpeg: [true, false]
        inkscape: [true, false]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute Docker tags
        id: tags
        run: |
          TAG="${{ matrix.python_version }}_${{ matrix.texlive_version }}"
          if [ "${{ matrix.ffmpeg }}" = "true" ]; then TAG="${TAG}-ffmpeg"; fi
          if [ "${{ matrix.inkscape }}" = "true" ]; then TAG="${TAG}-inkscape"; fi

          FULL="jeesoo9595/latex-matplotlib:${TAG}"

          if [ "${{ matrix.python_version }}" = "3.14" ] && \
             [ "${{ matrix.texlive_version }}" = "2025" ] && \
             [ "${{ matrix.ffmpeg }}" = "true" ] && \
             [ "${{ matrix.inkscape }}" = "true" ]; then
            FULL="${FULL},jeesoo9595/latex-matplotlib:latest"
          fi

          echo "tags=${FULL}" >> "$GITHUB_OUTPUT"

      - name: Log in to DockerHub
        if: github.event_name == 'release'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name == 'release' }}
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            PYTHON_VERSION=${{ matrix.python_version }}
            TEXLIVE_VERSION=${{ matrix.texlive_version }}
            INSTALL_FFMPEG=${{ matrix.ffmpeg }}
            INSTALL_INKSCAPE=${{ matrix.inkscape }}
          cache-from: type=gha,scope=py${{ matrix.python_version }}-tl${{ matrix.texlive_version }}-ff${{ matrix.ffmpeg }}-ink${{ matrix.inkscape }}
          cache-to: type=gha,mode=max,scope=py${{ matrix.python_version }}-tl${{ matrix.texlive_version }}-ff${{ matrix.ffmpeg }}-ink${{ matrix.inkscape }}
