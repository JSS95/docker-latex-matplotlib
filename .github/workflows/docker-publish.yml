name: CI/CD Docker Images

on:
  push:
    branches: [master]
  release:
    types: [published]

jobs:
  test-bash:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-15-intel]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker on macOS
        if: runner.os == 'macOS'
        uses: douglascamata/setup-docker-macos-action@v1.1.0

      - name: Build latest image
        run: |
          docker build -t jeesoo9595/latex-matplotlib:latest \
            --build-arg PYTHON_VERSION=3.14 \
            --build-arg TEXLIVE_VERSION=2025 \
            --build-arg INSTALL_FFMPEG=true \
            --build-arg INSTALL_INKSCAPE=true \
            .

      - name: Test
        working-directory: example
        run: |
          docker run --rm -v $(pwd):/usr/src/app -w /usr/src/app jeesoo9595/latex-matplotlib:latest make
          test -f main.pdf

  build-and-push:
    needs: [test-bash]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python_version: ["3.13", "3.14"]
        texlive_version: ["2025"]
        ffmpeg: [true, false]
        inkscape: [true, false]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        if: github.event_name == 'release'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute Docker tags
        id: tags
        run: |
          TAG="${{ matrix.python_version }}_${{ matrix.texlive_version }}"
          if [ "${{ matrix.ffmpeg }}" = "true" ]; then TAG="${TAG}-ffmpeg"; fi
          if [ "${{ matrix.inkscape }}" = "true" ]; then TAG="${TAG}-inkscape"; fi

          FULL="jeesoo9595/latex-matplotlib:${TAG}"

          if [ "${{ matrix.python_version }}" = "3.14" ] && \
             [ "${{ matrix.texlive_version }}" = "2025" ] && \
             [ "${{ matrix.ffmpeg }}" = "true" ] && \
             [ "${{ matrix.inkscape }}" = "true" ]; then
            FULL="${FULL},jeesoo9595/latex-matplotlib:latest"
          fi

          echo "tags=${FULL}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name == 'release' }}
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            PYTHON_VERSION=${{ matrix.python_version }}
            TEXLIVE_VERSION=${{ matrix.texlive_version }}
            INSTALL_FFMPEG=${{ matrix.ffmpeg }}
            INSTALL_INKSCAPE=${{ matrix.inkscape }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
